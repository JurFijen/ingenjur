<!DOCTYPE html>
<html lang="nl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactieve GPS Kaart</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Tailwind CSS voor styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Gebruik 'class' om dark mode handmatig te togglen via de <html> tag
        }
    </script>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #map {
            height: 100vh;
            width: 100vw;
            z-index: 1;
        }
        
        /* Voorkom witte flitsen bij inladen donkere tiles */
        html.dark #map {
            background-color: #111827; 
        }

        /* Filter om satellietbeelden donkerder te maken voor de dark mode */
        .dark-mode-tiles {
            filter: brightness(0.5) contrast(1.2) saturate(0.8);
        }

        /* Custom styling voor de blauwe GPS stip */
        .user-location-dot {
            background-color: #3b82f6;
            border: 2px solid white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .pulse {
            position: absolute;
            background: rgba(59, 130, 246, 0.4);
            border-radius: 50%;
            height: 40px;
            width: 40px;
            top: -12px;
            left: -12px;
            animation: pulsate 2s ease-out infinite;
            z-index: -1;
        }
        @keyframes pulsate {
            0% { transform: scale(0.1); opacity: 0.0; }
            50% { opacity: 1.0; }
            100% { transform: scale(1.2); opacity: 0.0; }
        }

        /* UI Controls positionering */
        .controls-right {
            position: absolute;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
        }
        .controls-left {
            position: absolute;
            bottom: 24px;
            left: 24px;
            z-index: 1000;
        }
        .info-box {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            pointer-events: none;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 transition-colors duration-300">

    <!-- Status Melding -->
    <div id="info" class="info-box opacity-0 bg-white dark:bg-gray-800 px-4 py-2 rounded-full shadow-md">
        <span id="status-text" class="text-sm font-medium text-gray-700 dark:text-gray-200">Locatie zoeken...</span>
    </div>

    <!-- Kaart Container -->
    <div id="map"></div>

    <!-- Laag & Thema Menu (Linksonder) -->
    <div class="controls-left flex flex-col gap-3">
        <div class="bg-white dark:bg-gray-800 p-3 rounded-xl shadow-lg flex flex-col gap-2 transition-colors duration-300 border dark:border-gray-700">
            <label for="layer-select" class="text-xs font-bold text-gray-600 dark:text-gray-300 uppercase tracking-wider">Kaartlaag</label>
            <select id="layer-select" class="bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white border border-gray-300 dark:border-gray-600 rounded p-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors">
                <option value="osm">Standaard (OSM)</option>
                <option value="sat">Satelliet</option>
                <option value="naut">Nautisch (OpenSeaMap)</option>
            </select>
        </div>
    </div>

    <!-- Actie Knoppen (Rechtsonder) -->
    <div class="controls-right flex flex-col gap-3">
        <!-- Dark Mode Toggle Knop -->
        <button id="theme-btn" class="bg-white dark:bg-gray-800 p-3 rounded-full shadow-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-all active:scale-95 focus:outline-none border dark:border-gray-700" title="Schakel donkere modus">
            <!-- Zon Icoon (Zichtbaar in dark mode) -->
            <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-yellow-500 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            <!-- Maan Icoon (Zichtbaar in light mode) -->
            <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
        </button>

        <!-- Recenter Knop -->
        <button id="recenter-btn" class="bg-white dark:bg-gray-800 p-3 rounded-full shadow-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-all active:scale-95 focus:outline-none border dark:border-gray-700" title="Centreer op mijn locatie">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600 dark:text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </button>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        let map;
        let userMarker;
        let userCircle;
        let firstUpdate = true;
        
        // Status elementen
        const statusEl = document.getElementById('info');
        const statusText = document.getElementById('status-text');

        // Thema state
        let isDark = false;
        let currentLayerType = 'osm';
        let activeMapLayer = null;

        // Definieer alle mogelijke kaartlagen
        const layers = {
            // 1. Gewoon OSM
            'osm_light': L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }),
            // 2. OSM Donker (CartoDB Dark Matter)
            'osm_dark': L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap, © CartoDB'
            }),
            // 3. Satelliet (Esri)
            'sat_light': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19,
                attribution: '© Esri'
            }),
            // 4. Satelliet Donker (Esri met CSS filter)
            'sat_dark': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19,
                attribution: '© Esri',
                className: 'dark-mode-tiles' // Activeert de CSS filter
            }),
            // 5. Nautisch (OSM + OpenSeaMap)
            'naut_light': L.layerGroup([
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }),
                L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenSeaMap' })
            ]),
            // 6. Nautisch Donker (CartoDB Dark + OpenSeaMap)
            'naut_dark': L.layerGroup([
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }),
                L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenSeaMap' })
            ])
        };

        function initMap() {
            map = L.map('map', {
                zoomControl: false 
            }).setView([52.1326, 5.2913], 7);

            L.control.zoom({ position: 'topright' }).addTo(map);

            // Zet de initiële laag
            updateMapLayer();
            startTracking();
        }

        // Functie om de juiste laag te laden op basis van instellingen
        function updateMapLayer() {
            if (activeMapLayer) {
                map.removeLayer(activeMapLayer);
            }
            const mode = isDark ? 'dark' : 'light';
            const layerKey = `${currentLayerType}_${mode}`;
            
            activeMapLayer = layers[layerKey];
            activeMapLayer.addTo(map);
        }

        // --- THEMA EN LAAG SCHAKEL LOGICA ---
        
        document.getElementById('theme-btn').addEventListener('click', () => {
            isDark = !isDark;
            // Toggle de 'dark' class op de root HTML tag voor Tailwind
            document.documentElement.classList.toggle('dark', isDark);
            // Update de kaart naar de donkere/lichte variant
            updateMapLayer();
        });

        document.getElementById('layer-select').addEventListener('change', (e) => {
            currentLayerType = e.target.value;
            // Update de kaart met de nieuwe soort, met behoud van dark/light status
            updateMapLayer();
        });

        // --- GPS TRACKING LOGICA ---

        const locationIcon = L.divIcon({
            className: 'user-location-marker',
            html: '<div class="user-location-dot"><div class="pulse"></div></div>',
            iconSize: [16, 16],
            iconAnchor: [8, 8]
        });

        function startTracking() {
            if (!navigator.geolocation) {
                showStatus("Je browser ondersteunt geen GPS.", true);
                return;
            }

            statusEl.classList.remove('opacity-0');

            navigator.geolocation.watchPosition(
                (position) => {
                    const { latitude, longitude, accuracy } = position.coords;
                    const latlng = [latitude, longitude];

                    if (firstUpdate) {
                        map.setView(latlng, 16);
                        firstUpdate = false;
                        statusEl.classList.add('opacity-0'); 
                    }

                    updateUserLocation(latlng, accuracy);
                },
                (error) => {
                    let msg = "Kon locatie niet bepalen.";
                    if (error.code === 1) msg = "Geef toestemming voor locatie.";
                    showStatus(msg, true);
                },
                {
                    enableHighAccuracy: true,
                    maximumAge: 10000,
                    timeout: 5000
                }
            );
        }

        function updateUserLocation(latlng, accuracy) {
            if (userMarker) {
                userMarker.setLatLng(latlng);
                userCircle.setLatLng(latlng);
                userCircle.setRadius(accuracy);
            } else {
                userCircle = L.circle(latlng, {
                    radius: accuracy,
                    weight: 1,
                    color: '#3b82f6',
                    fillColor: '#3b82f6',
                    fillOpacity: 0.15
                }).addTo(map);

                userMarker = L.marker(latlng, { icon: locationIcon }).addTo(map);
            }
        }

        function showStatus(text, isError = false) {
            statusText.innerText = text;
            statusText.className = isError 
                ? "text-sm font-medium text-red-500 dark:text-red-400" 
                : "text-sm font-medium text-gray-700 dark:text-gray-200";
            statusEl.classList.remove('opacity-0');
        }

        document.getElementById('recenter-btn').addEventListener('click', () => {
            if (userMarker) {
                map.flyTo(userMarker.getLatLng(), 17);
            } else {
                startTracking();
            }
        });

        window.onload = initMap;
    </script>
</body>
</html>
