<!DOCTYPE html>
<html lang="nl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactieve GPS Kaart met Nautische Info</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Tailwind CSS voor styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #map {
            height: 100vh;
            width: 100vw;
            z-index: 1;
        }
        html.dark #map {
            background-color: #111827; 
        }
        .dark-mode-tiles {
            filter: brightness(0.5) contrast(1.2) saturate(0.8);
        }
        .user-location-dot {
            background-color: #3b82f6;
            border: 2px solid white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .pulse {
            position: absolute;
            background: rgba(59, 130, 246, 0.4);
            border-radius: 50%;
            height: 40px;
            width: 40px;
            top: -12px;
            left: -12px;
            animation: pulsate 2s ease-out infinite;
            z-index: -1;
        }
        @keyframes pulsate {
            0% { transform: scale(0.1); opacity: 0.0; }
            50% { opacity: 1.0; }
            100% { transform: scale(1.2); opacity: 0.0; }
        }
        .controls-right {
            position: absolute;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
        }
        .menu-btn-container {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 1000;
        }
        .info-box {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        /* Extra cursors voor de verschillende actiemodussen */
        .crosshair-cursor-enabled {
            cursor: crosshair !important;
        }
        .help-cursor-enabled {
            cursor: help !important;
        }
        /* Leaflet popup styling override voor betere leesbaarheid */
        .leaflet-popup-content {
            margin: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 transition-colors duration-300">

    <!-- Status Melding -->
    <div id="info" class="info-box opacity-0 bg-white dark:bg-gray-800 px-4 py-2 rounded-full shadow-md border dark:border-gray-700">
        <span id="status-text" class="text-sm font-medium text-gray-700 dark:text-gray-200">Locatie zoeken...</span>
    </div>

    <!-- Kaart Container -->
    <div id="map"></div>

    <!-- Hamburger Menu Knop (Linksboven) -->
    <div class="menu-btn-container">
        <button id="menu-btn" class="bg-white dark:bg-gray-800 p-3 rounded-xl shadow-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-all border dark:border-gray-700 focus:outline-none" title="Open Menu">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-800 dark:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
    </div>

    <!-- Zijmenu -->
    <div id="side-menu" class="absolute top-0 left-0 h-full w-80 bg-white dark:bg-gray-800 z-[1001] shadow-2xl transform -translate-x-full transition-transform duration-300 flex flex-col p-5 border-r dark:border-gray-700">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-gray-800 dark:text-white">Menu</h2>
            <button id="close-menu-btn" class="text-gray-500 hover:text-gray-800 dark:hover:text-white focus:outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="overflow-y-auto flex-1 pb-4">
            <!-- Instellingen (Auto Center) -->
            <div class="mb-6">
                <h3 class="text-sm font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-3 border-b dark:border-gray-700 pb-2">Instellingen</h3>
                <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-800 dark:text-gray-200 hover:text-blue-500 transition-colors">
                    <input type="checkbox" id="auto-center-toggle" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600">
                    Automatisch inzoomen (elke 5s)
                </label>
            </div>

            <!-- Kaartlagen Selectie -->
            <div class="mb-6">
                <h3 class="text-sm font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-3 border-b dark:border-gray-700 pb-2">Kaartlaag</h3>
                <div class="flex flex-col gap-3">
                    <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-800 dark:text-gray-200 hover:text-blue-500 transition-colors">
                        <input type="radio" name="layer" value="osm" class="layer-radio w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600" checked>
                        Standaard (OSM)
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-800 dark:text-gray-200 hover:text-blue-500 transition-colors">
                        <input type="radio" name="layer" value="sat" class="layer-radio w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600">
                        Satelliet
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-800 dark:text-gray-200 hover:text-blue-500 transition-colors">
                        <input type="radio" name="layer" value="naut" class="layer-radio w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600">
                        Nautisch (OpenSeaMap)
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-800 dark:text-gray-200 hover:text-blue-500 transition-colors">
                        <input type="radio" name="layer" value="sat_naut" class="layer-radio w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600">
                        Satelliet + Nautisch
                    </label>
                </div>
            </div>

            <!-- Interactiviteit (Prikken & Info) -->
            <div class="mb-6">
                <h3 class="text-sm font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-3 border-b dark:border-gray-700 pb-2">Acties op de kaart</h3>
                
                <!-- 1. Punt prikken -->
                <button id="pick-point-btn" class="w-full bg-blue-500 text-white font-medium py-2 px-4 rounded-lg hover:bg-blue-600 mb-3 transition-colors flex items-center justify-center gap-2 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /></svg>
                    Punt prikken
                </button>

                <!-- 2. Nautische info (Nieuw) -->
                <button id="naut-info-btn" class="w-full bg-indigo-500 text-white font-medium py-2 px-4 rounded-lg hover:bg-indigo-600 transition-colors flex items-center justify-center gap-2 shadow-sm">
                    ℹ️ Nautische info opvragen
                </button>
            </div>

            <!-- 3. Locatie zoeken -->
            <div class="mb-6">
                <h3 class="text-sm font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-3 border-b dark:border-gray-700 pb-2">Zoek Locatie</h3>
                <div class="flex gap-2">
                    <input type="text" id="search-input" class="w-full px-3 py-2 border rounded-lg bg-gray-50 dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="bijv. Parijs">
                    <button id="search-btn" class="bg-gray-200 dark:bg-gray-600 hover:bg-gray-300 dark:hover:bg-gray-500 px-3 py-2 rounded-lg text-gray-800 dark:text-white transition-colors border dark:border-gray-600" title="Zoeken">
                        🔍
                    </button>
                </div>
            </div>

            <!-- 4. Locatie opslaan -->
            <button id="save-location-btn" class="w-full bg-green-500 text-white font-medium py-2 px-4 rounded-lg hover:bg-green-600 mb-6 transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
                💾 Sla laatste zoekopdracht op
            </button>

            <!-- 5. Opgeslagen locaties -->
            <div class="mt-2">
                <h3 class="text-sm font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-3 border-b dark:border-gray-700 pb-2">Opgeslagen Locaties</h3>
                <ul id="saved-locations-list" class="space-y-2">
                    <!-- Wordt dynamisch gevuld -->
                </ul>
            </div>
        </div>
    </div>

    <!-- Actie Knoppen (Rechtsonder) -->
    <div class="controls-right flex flex-col gap-3">
        <!-- Dark Mode Toggle Knop -->
        <button id="theme-btn" class="bg-white dark:bg-gray-800 p-3 rounded-full shadow-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-all active:scale-95 focus:outline-none border dark:border-gray-700" title="Schakel donkere modus">
            <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-yellow-500 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
            <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
        </button>

        <!-- Recenter Knop -->
        <button id="recenter-btn" class="bg-white dark:bg-gray-800 p-3 rounded-full shadow-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-all active:scale-95 focus:outline-none border dark:border-gray-700" title="Centreer op mijn locatie">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600 dark:text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </button>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        let map;
        let userMarker;
        let userCircle;
        let firstUpdate = true;
        let searchedMarker; 
        let distanceLine; 
        
        // Status elementen
        const statusEl = document.getElementById('info');
        const statusText = document.getElementById('status-text');

        // Menu Variabelen
        let isPickingPoint = false;
        let isGettingNauticalInfo = false;
        let lastSearchedLocation = null;
        let savedLocations = JSON.parse(localStorage.getItem('savedLocations') || '[]');
        let isAutoCenterActive = false;

        // Thema state
        let isDark = false;
        let currentLayerType = 'osm';
        let activeMapLayer = null;

        const layers = {
            'osm_light': L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }),
            'osm_dark': L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19, attribution: '© OpenStreetMap, © CartoDB' }),
            'sat_light': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19, attribution: '© Esri' }),
            'sat_dark': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19, attribution: '© Esri', className: 'dark-mode-tiles' }),
            'naut_light': L.layerGroup([
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }),
                L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenSeaMap' })
            ]),
            'naut_dark': L.layerGroup([
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }),
                L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenSeaMap' })
            ]),
            'sat_naut_light': L.layerGroup([
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19, attribution: '© Esri' }),
                L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenSeaMap' })
            ]),
            'sat_naut_dark': L.layerGroup([
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19, attribution: '© Esri', className: 'dark-mode-tiles' }),
                L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenSeaMap' })
            ])
        };

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([52.1326, 5.2913], 7);
            L.control.zoom({ position: 'topright' }).addTo(map);

            updateMapLayer();
            startTracking();
            renderSavedLocations();

            // Algemene Click handler voor de actiemodussen
            map.on('click', function(e) {
                if (isPickingPoint) {
                    // Modus: Coördinaten prikken
                    const coords = `${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
                    navigator.clipboard.writeText(coords).then(() => {
                        showStatus(`Coördinaten gekopieerd: ${coords}`);
                        resetMapModes(); 
                        setTimeout(() => statusEl.classList.add('opacity-0'), 3000);
                    }).catch(() => {
                        showStatus('Kopiëren mislukt', true);
                    });
                } else if (isGettingNauticalInfo) {
                    // Modus: Nautische info ophalen
                    fetchNauticalInfo(e.latlng);
                }
            });
        }

        // --- THEMA EN LAGEN ---
        function updateMapLayer() {
            if (activeMapLayer) map.removeLayer(activeMapLayer);
            const mode = isDark ? 'dark' : 'light';
            activeMapLayer = layers[`${currentLayerType}_${mode}`];
            activeMapLayer.addTo(map);
        }

        document.getElementById('theme-btn').addEventListener('click', () => {
            isDark = !isDark;
            document.documentElement.classList.toggle('dark', isDark);
            updateMapLayer();
        });

        const layerRadios = document.querySelectorAll('.layer-radio');
        layerRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (e.target.checked) {
                    currentLayerType = e.target.value;
                    updateMapLayer();
                    
                    // Schakel nautische info modus uit als nautische laag wordt verlaten om verwarring te voorkomen
                    if (isGettingNauticalInfo && !currentLayerType.includes('naut')) {
                        resetMapModes();
                        showStatus('Nautische Info modus gestopt (laag gewijzigd)');
                        setTimeout(() => statusEl.classList.add('opacity-0'), 3000);
                    }
                }
            });
        });

        // --- ZIJMENU LOGICA ---
        const sideMenu = document.getElementById('side-menu');
        
        document.getElementById('menu-btn').addEventListener('click', () => {
            sideMenu.classList.remove('-translate-x-full');
        });

        document.getElementById('close-menu-btn').addEventListener('click', () => {
            sideMenu.classList.add('-translate-x-full');
        });

        // --- AUTO CENTER LOGICA ---
        document.getElementById('auto-center-toggle').addEventListener('change', (e) => {
            isAutoCenterActive = e.target.checked;
            if (isAutoCenterActive && userMarker) {
                map.flyTo(userMarker.getLatLng(), Math.max(map.getZoom(), 16));
                showStatus('Auto-centreren ingeschakeld');
                setTimeout(() => statusEl.classList.add('opacity-0'), 2000);
            }
        });

        setInterval(() => {
            if (isAutoCenterActive && userMarker) {
                map.panTo(userMarker.getLatLng(), { animate: true, duration: 1.0 });
            }
        }, 5000);

        // --- INTERACTIE MODUSSEN (Punt Prikken & Nautische Info) ---
        let pickPointBtn = document.getElementById('pick-point-btn');
        let nautInfoBtn = document.getElementById('naut-info-btn');
        let mapDiv = document.getElementById('map');

        // Reset beide modi naar de standaard instelling
        function resetMapModes() {
            isPickingPoint = false;
            isGettingNauticalInfo = false;
            mapDiv.classList.remove('crosshair-cursor-enabled', 'help-cursor-enabled');
            
            // Reset Prik-knop
            pickPointBtn.classList.replace('bg-yellow-500', 'bg-blue-500');
            pickPointBtn.classList.replace('hover:bg-yellow-600', 'hover:bg-blue-600');
            pickPointBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /></svg> Punt prikken';
            
            // Reset Nautische Info-knop
            nautInfoBtn.classList.replace('bg-yellow-500', 'bg-indigo-500');
            nautInfoBtn.classList.replace('hover:bg-yellow-600', 'hover:bg-indigo-600');
            nautInfoBtn.innerHTML = 'ℹ️ Nautische info opvragen';
            
            statusEl.classList.add('opacity-0');
        }

        pickPointBtn.addEventListener('click', () => {
            if (isPickingPoint) {
                resetMapModes();
            } else {
                resetMapModes(); // Reset alles eerst
                isPickingPoint = true;
                mapDiv.classList.add('crosshair-cursor-enabled');
                pickPointBtn.classList.replace('bg-blue-500', 'bg-yellow-500');
                pickPointBtn.classList.replace('hover:bg-blue-600', 'hover:bg-yellow-600');
                pickPointBtn.innerHTML = '🛑 Annuleer prikken';
                showStatus('Klik op de kaart om coördinaten te kopiëren...');
                sideMenu.classList.add('-translate-x-full'); 
            }
        });

        nautInfoBtn.addEventListener('click', () => {
            if (isGettingNauticalInfo) {
                resetMapModes();
            } else {
                // Waarschuw als nautische laag niet aan staat
                if (!currentLayerType.includes('naut')) {
                    showStatus('Tip: Zet eerst een Nautische kaartlaag aan!', true);
                    setTimeout(() => statusEl.classList.add('opacity-0'), 4000);
                    return; // Of laat het doorgaan, maar de waarschuwing is handig
                }

                resetMapModes(); // Reset alles eerst
                isGettingNauticalInfo = true;
                mapDiv.classList.add('help-cursor-enabled');
                nautInfoBtn.classList.replace('bg-indigo-500', 'bg-yellow-500');
                nautInfoBtn.classList.replace('hover:bg-indigo-600', 'hover:bg-yellow-600');
                nautInfoBtn.innerHTML = '🛑 Annuleer info ophalen';
                showStatus('Klik op of nabij een boei/markering voor info...');
                sideMenu.classList.add('-translate-x-full'); 
            }
        });

        // --- NAUTISCHE INFORMATIE OPHALEN (Overpass API) ---
        // Globale functie voor het kopiëren vanuit de leaflet popup
        window.copyNauticalData = function() {
            if(window.lastNauticalTextToCopy) {
                navigator.clipboard.writeText(window.lastNauticalTextToCopy).then(() => {
                    showStatus('Nautische informatie gekopieerd!');
                    setTimeout(() => statusEl.classList.add('opacity-0'), 3000);
                }).catch(() => {
                    showStatus('Kon tekst niet kopiëren.', true);
                });
            }
        };

        async function fetchNauticalInfo(latlng) {
            showStatus('Zoeken naar markeringen (straal 100m)...');
            
            // Overpass QL Query: Zoek naar nodes en ways met een 'seamark:type' in 100 meter radius
            const radius = 100;
            const query = `
                [out:json][timeout:10];
                (
                  node["seamark:type"](around:${radius}, ${latlng.lat}, ${latlng.lng});
                  way["seamark:type"](around:${radius}, ${latlng.lat}, ${latlng.lng});
                );
                out tags;
            `;

            try {
                const response = await fetch('https://overpass-api.de/api/interpreter', {
                    method: 'POST',
                    body: query
                });
                const data = await response.json();

                if (data.elements && data.elements.length > 0) {
                    // Pak het eerste element. (Vaak is er maar 1 markering binnen 100m)
                    const tags = data.elements[0].tags;
                    
                    let htmlContent = '<h3 class="font-bold text-base mb-2 border-b pb-1 text-gray-800">Nautische Informatie</h3><ul class="text-xs space-y-1 mb-3 text-gray-700">';
                    let plainText = '--- Nautische Informatie ---\n';

                    const type = tags['seamark:type'] || 'Onbekend';
                    const name = tags['seamark:name'] || tags['name'] || 'Geen specifieke naam';
                    
                    htmlContent += `<li><span class="font-semibold">Type:</span> ${type}</li>`;
                    htmlContent += `<li><span class="font-semibold">Naam:</span> ${name}</li>`;
                    plainText += `Type: ${type}\nNaam: ${name}\n`;

                    // Loop door alle andere seamark attributen
                    for (const [key, value] of Object.entries(tags)) {
                        if (key.startsWith('seamark:') && key !== 'seamark:type' && key !== 'seamark:name') {
                            const cleanKey = key.replace('seamark:', '').replace(/_/g, ' ');
                            // Maak de eerste letter van de sleutel een hoofdletter
                            const capitalizedKey = cleanKey.charAt(0).toUpperCase() + cleanKey.slice(1);
                            
                            htmlContent += `<li><span class="font-semibold">${capitalizedKey}:</span> ${value}</li>`;
                            plainText += `${capitalizedKey}: ${value}\n`;
                        }
                    }
                    htmlContent += '</ul>';

                    // Sla tekst op zodat de inline knop deze kan gebruiken
                    window.lastNauticalTextToCopy = plainText;

                    const popupBody = `
                        <div class="min-w-[200px]">
                            ${htmlContent}
                            <button onclick="window.copyNauticalData()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-medium py-1.5 px-3 rounded text-xs transition-colors shadow-sm">
                                📋 Kopieer deze tekst
                            </button>
                        </div>
                    `;

                    L.popup()
                        .setLatLng(latlng)
                        .setContent(popupBody)
                        .openOn(map);

                    showStatus('Gegevens gevonden.', false);
                    setTimeout(() => statusEl.classList.add('opacity-0'), 2000);
                } else {
                    showStatus('Geen nautische markeringen gevonden binnen 100m.', true);
                    setTimeout(() => statusEl.classList.add('opacity-0'), 3000);
                }
            } catch (error) {
                console.error("Overpass API error:", error);
                showStatus('Fout bij ophalen nautische data.', true);
                setTimeout(() => statusEl.classList.add('opacity-0'), 3000);
            }
        }


        // --- ZOEKEN & AFSTAND METEN LOGICA ---
        async function performSearch() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;

            showStatus('Zoeken...');
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (data && data.length > 0) {
                    const result = data[0];
                    const lat = parseFloat(result.lat);
                    const lon = parseFloat(result.lon);
                    const name = result.display_name.split(',')[0]; 
                    const targetLatLng = L.latLng(lat, lon);

                    lastSearchedLocation = { name: name, lat: lat, lon: lon };
                    sideMenu.classList.add('-translate-x-full'); 

                    if (searchedMarker) map.removeLayer(searchedMarker);
                    if (distanceLine) map.removeLayer(distanceLine);

                    searchedMarker = L.marker(targetLatLng).addTo(map);

                    let distanceText = "";
                    if (userMarker) {
                        const userLatLng = userMarker.getLatLng();
                        const distMeters = userLatLng.distanceTo(targetLatLng);

                        if (distMeters > 1000) {
                            distanceText = ` (Afstand: ${(distMeters / 1000).toFixed(1)} km)`;
                        } else {
                            distanceText = ` (Afstand: ${Math.round(distMeters)} m)`;
                        }

                        distanceLine = L.polyline([userLatLng, targetLatLng], {
                            color: '#ef4444', 
                            weight: 3,
                            dashArray: '10, 10',
                            opacity: 0.8
                        }).addTo(map);

                        searchedMarker.bindPopup(`<b>${name}</b><br>${distanceText}`).openPopup();
                        map.fitBounds(L.latLngBounds(userLatLng, targetLatLng), { padding: [50, 50] });
                    } else {
                        map.flyTo(targetLatLng, 12);
                        searchedMarker.bindPopup(`<b>${name}</b>`).openPopup();
                    }
                    
                    showStatus(`Gevonden: ${name}${distanceText}`);
                    setTimeout(() => statusEl.classList.add('opacity-0'), 5000);
                } else {
                    showStatus('Locatie niet gevonden', true);
                    setTimeout(() => statusEl.classList.add('opacity-0'), 3000);
                }
            } catch (error) {
                showStatus('Fout bij het zoeken', true);
            }
        }

        document.getElementById('search-btn').addEventListener('click', performSearch);
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        // --- OPGESLAGEN LOCATIES LOGICA ---
        function renderSavedLocations() {
            const list = document.getElementById('saved-locations-list');
            list.innerHTML = '';

            if (savedLocations.length === 0) {
                list.innerHTML = '<li class="text-xs text-gray-500 dark:text-gray-400 italic">Nog geen locaties opgeslagen.</li>';
                return;
            }

            savedLocations.forEach((loc, index) => {
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center p-2 bg-gray-50 dark:bg-gray-700 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors cursor-pointer text-sm text-gray-800 dark:text-gray-200 border dark:border-gray-600 shadow-sm';
                
                const span = document.createElement('span');
                span.innerText = loc.name;
                span.className = 'flex-1 truncate pr-2';
                span.onclick = () => {
                    document.getElementById('search-input').value = loc.name;
                    performSearch();
                };

                const deleteBtn = document.createElement('button');
                deleteBtn.innerHTML = '✖';
                deleteBtn.className = 'text-red-500 hover:text-red-700 p-1 text-xs';
                deleteBtn.title = "Verwijderen";
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    savedLocations.splice(index, 1);
                    localStorage.setItem('savedLocations', JSON.stringify(savedLocations));
                    renderSavedLocations();
                };

                li.appendChild(span);
                li.appendChild(deleteBtn);
                list.appendChild(li);
            });
        }

        document.getElementById('save-location-btn').addEventListener('click', () => {
            if (lastSearchedLocation) {
                const alreadyExists = savedLocations.some(l => l.lat === lastSearchedLocation.lat && l.lon === lastSearchedLocation.lon);
                if (!alreadyExists) {
                    savedLocations.unshift(lastSearchedLocation); 
                    localStorage.setItem('savedLocations', JSON.stringify(savedLocations));
                    renderSavedLocations();
                    showStatus('Locatie opgeslagen!');
                } else {
                    showStatus('Deze locatie staat al in de lijst.', true);
                }
            } else {
                showStatus('Zoek eerst een locatie om op te slaan.', true);
            }
            setTimeout(() => statusEl.classList.add('opacity-0'), 3000);
        });

        // --- GPS TRACKING LOGICA ---
        const locationIcon = L.divIcon({
            className: 'user-location-marker',
            html: '<div class="user-location-dot"><div class="pulse"></div></div>',
            iconSize: [16, 16],
            iconAnchor: [8, 8]
        });

        function startTracking() {
            if (!navigator.geolocation) {
                showStatus("Je browser ondersteunt geen GPS.", true);
                return;
            }

            statusEl.classList.remove('opacity-0');

            navigator.geolocation.watchPosition(
                (position) => {
                    const { latitude, longitude, accuracy } = position.coords;
                    const latlng = [latitude, longitude];

                    if (firstUpdate) {
                        map.setView(latlng, 16);
                        firstUpdate = false;
                        statusEl.classList.add('opacity-0'); 
                    }
                    updateUserLocation(latlng, accuracy);
                },
                (error) => {
                    let msg = "Kon locatie niet bepalen.";
                    if (error.code === 1) msg = "Geef toestemming voor locatie.";
                    showStatus(msg, true);
                },
                { enableHighAccuracy: true, maximumAge: 10000, timeout: 5000 }
            );
        }

        function updateUserLocation(latlng, accuracy) {
            if (userMarker) {
                userMarker.setLatLng(latlng);
                userCircle.setLatLng(latlng);
                userCircle.setRadius(accuracy);

                if (distanceLine && lastSearchedLocation) {
                    distanceLine.setLatLngs([latlng, [lastSearchedLocation.lat, lastSearchedLocation.lon]]);
                }
            } else {
                userCircle = L.circle(latlng, { radius: accuracy, weight: 1, color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 0.15 }).addTo(map);
                userMarker = L.marker(latlng, { icon: locationIcon }).addTo(map);
            }
        }

        function showStatus(text, isError = false) {
            statusText.innerText = text;
            statusText.className = isError 
                ? "text-sm font-medium text-red-500 dark:text-red-400" 
                : "text-sm font-medium text-gray-700 dark:text-gray-200";
            statusEl.classList.remove('opacity-0');
        }

        document.getElementById('recenter-btn').addEventListener('click', () => {
            if (userMarker) {
                map.flyTo(userMarker.getLatLng(), Math.max(map.getZoom(), 16));
            } else {
                startTracking();
            }
        });

        window.onload = initMap;
    </script>
</body>
</html>
