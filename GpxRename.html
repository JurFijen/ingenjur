<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Activiteit Converter & Renamer</title>
    
    <!-- Tailwind CSS voor styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- JSZip voor het bundelen van de downloads -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <!-- React & Babel voor de interface -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .spinner {
            border: 3px solid rgba(0, 0, 0, 0.1);
            width: 20px; height: 20px; border-radius: 50%;
            border-left-color: #ffffff;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Aangepaste scrollbar voor de tabel */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 p-4 sm:p-8">

    <div id="root"></div>

    <script type="text/babel">
        // --- CONVERSIE LOGICA ---

        // Functie: TCX naar GPX
        const tcxToGpx = (tcxString, originalName) => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(tcxString, "text/xml");
            
            let sport = "Onbekend";
            const activities = xmlDoc.getElementsByTagName("Activity");
            if(activities.length > 0) {
                sport = activities[0].getAttribute("Sport") || "Onbekend";
            }
            
            const idNode = xmlDoc.getElementsByTagName("Id")[0];
            const time = idNode ? idNode.textContent : new Date().toISOString();
            
            let gpx = `<?xml version="1.0" encoding="UTF-8"?>\n`;
            gpx += `<gpx version="1.1" creator="ActiviteitConverter" xmlns="http://www.topografix.com/GPX/1/1" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:schemaLocation="http://www.topografix.com/GPX/1/1 http://www.topografix.com/GPX/1/1/gpx.xsd">\n`;
            gpx += `  <metadata>\n    <time>${time}</time>\n  </metadata>\n`;
            gpx += `  <trk>\n    <name>${originalName.replace(/\.tcx$/i, '')}</name>\n    <type>${sport}</type>\n    <trkseg>\n`;

            const trackpoints = xmlDoc.getElementsByTagName("Trackpoint");
            for(let i = 0; i < trackpoints.length; i++) {
                const pt = trackpoints[i];
                const timeNode = pt.getElementsByTagName("Time")[0];
                const posNode = pt.getElementsByTagName("Position")[0];
                const eleNode = pt.getElementsByTagName("AltitudeMeters")[0];
                
                if (posNode) {
                    const latNode = posNode.getElementsByTagName("LatitudeDegrees")[0];
                    const lonNode = posNode.getElementsByTagName("LongitudeDegrees")[0];
                    if (latNode && lonNode) {
                        let timeStr = timeNode ? `\n        <time>${timeNode.textContent}</time>` : "";
                        let eleStr = eleNode ? `\n        <ele>${eleNode.textContent}</ele>` : "";
                        gpx += `      <trkpt lat="${latNode.textContent}" lon="${lonNode.textContent}">${eleStr}${timeStr}\n      </trkpt>\n`;
                    }
                }
            }

            gpx += `    </trkseg>\n  </trk>\n</gpx>`;
            return gpx;
        };

        // Functie: FIT naar GPX
        const fitToGpx = async (arrayBuffer, originalName, FitParserClass) => {
            return new Promise((resolve, reject) => {
                try {
                    const fitParser = new FitParserClass({
                        force: true, speedUnit: 'km/h', lengthUnit: 'km', temperatureUnit: 'celsius',
                        elapsedRecordField: true, mode: 'cascade'
                    });
                    
                    fitParser.parse(new Uint8Array(arrayBuffer), (error, data) => {
                        if(error) { reject(error); return; }
                        
                        let sport = "Onbekend";
                        let startTime = new Date();
                        
                        if (data.sessions && data.sessions.length > 0) {
                            sport = data.sessions[0].sport || sport;
                            startTime = data.sessions[0].start_time || startTime;
                        } else if (data.records && data.records.length > 0 && data.records[0].timestamp) {
                            startTime = data.records[0].timestamp;
                        }

                        let timeStr = (startTime instanceof Date) ? startTime.toISOString() : new Date(startTime).toISOString();

                        let gpx = `<?xml version="1.0" encoding="UTF-8"?>\n`;
                        gpx += `<gpx version="1.1" creator="ActiviteitConverter" xmlns="http://www.topografix.com/GPX/1/1">\n`;
                        gpx += `  <metadata>\n    <time>${timeStr}</time>\n  </metadata>\n`;
                        gpx += `  <trk>\n    <name>${originalName.replace(/\.fit$/i, '')}</name>\n    <type>${sport}</type>\n    <trkseg>\n`;

                        if (data.records) {
                            data.records.forEach(r => {
                                if (r.position_lat !== undefined && r.position_long !== undefined) {
                                    let lat = r.position_lat;
                                    let lon = r.position_long;
                                    if (Math.abs(lat) > 180) {
                                        lat = lat * (180.0 / Math.pow(2, 31));
                                        lon = lon * (180.0 / Math.pow(2, 31));
                                    }
                                    let ele = r.altitude !== undefined ? `\n        <ele>${r.altitude}</ele>` : "";
                                    let ptTime = r.timestamp ? `\n        <time>${(r.timestamp instanceof Date ? r.timestamp : new Date(r.timestamp)).toISOString()}</time>` : "";
                                    gpx += `      <trkpt lat="${lat}" lon="${lon}">${ele}${ptTime}\n      </trkpt>\n`;
                                }
                            });
                        }

                        gpx += `    </trkseg>\n  </trk>\n</gpx>`;
                        resolve(gpx);
                    });
                } catch(e) {
                    reject(e);
                }
            });
        };

        // --- NAAMGEVING LOGICA (FASE 2) ---

        const getNewNameFromGpx = (gpxString, originalName) => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(gpxString, "text/xml");
            
            let datePart = "000000";
            let typePart = "Onbekend";
            let namePart = "Activiteit";
            
            const timeNodes = xmlDoc.getElementsByTagName("time");
            if (timeNodes.length > 0) {
                for(let i=0; i<timeNodes.length; i++) {
                    let d = new Date(timeNodes[i].textContent);
                    if (!isNaN(d.getTime())) {
                        const yy = String(d.getFullYear()).slice(-2);
                        const mm = String(d.getMonth() + 1).padStart(2, '0');
                        const dd = String(d.getDate()).padStart(2, '0');
                        datePart = `${yy}${mm}${dd}`;
                        break;
                    }
                }
            }
            
            const typeNodes = xmlDoc.getElementsByTagName("type");
            if (typeNodes.length > 0 && typeNodes[0].textContent) {
                typePart = typeNodes[0].textContent.trim();
            }
            
            const trkNodes = xmlDoc.getElementsByTagName("trk");
            let nameFound = false;
            if (trkNodes.length > 0) {
                const trkNameNodes = trkNodes[0].getElementsByTagName("name");
                if (trkNameNodes.length > 0 && trkNameNodes[0].textContent) {
                    namePart = trkNameNodes[0].textContent.trim();
                    nameFound = true;
                }
            }
            if (!nameFound) {
                const nameNodes = xmlDoc.getElementsByTagName("name");
                if (nameNodes.length > 0 && nameNodes[0].textContent) {
                    namePart = nameNodes[0].textContent.trim();
                } else {
                    namePart = originalName.replace(/\.[^/.]+$/, "");
                }
            }
            
            const cleanStr = (str) => {
                let s = str.replace(/\s+/g, '-');
                s = s.replace(/_/g, '-');
                return s.replace(/[^a-zA-Z0-9-]/g, '');
            };
            
            typePart = cleanStr(typePart) || "Onbekend";
            namePart = cleanStr(namePart) || "Activiteit";
            
            return `${datePart}_${typePart}_${namePart}.gpx`;
        };

        // --- REACT INTERFACE ---

        const App = () => {
            const [files, setFiles] = React.useState([]);
            const [isProcessing, setIsProcessing] = React.useState(false);
            const [progressText, setProgressText] = React.useState("");

            // Bereken statistieken
            const totalFiles = files.length;
            const convertedCount = files.filter(f => f.status === 'converted' || f.status === 'renamed').length;
            const errorCount = files.filter(f => f.status === 'error').length;
            const pendingCount = files.filter(f => f.status === 'pending').length;

            const handleFileSelect = (e) => {
                const selectedFiles = Array.from(e.target.files).filter(f => {
                    const name = f.name.toLowerCase();
                    return name.endsWith('.gpx') || name.endsWith('.tcx') || name.endsWith('.fit');
                });
                
                const newFiles = selectedFiles.map(f => ({
                    id: crypto.randomUUID(),
                    fileObj: f,
                    originalName: f.name,
                    ext: f.name.split('.').pop().toLowerCase(),
                    status: 'pending',
                    gpxContent: null,
                    newName: null,
                    errorMsg: null
                }));
                
                setFiles(newFiles);
                setProgressText("");
            };

            const runPhase1 = async () => {
                setIsProcessing(true);
                setProgressText("Laden van FIT Parser...");
                let currentFiles = [...files];
                
                // Laad FIT parser dynamisch via esm.sh (met ?bundle om Node afhankelijkheden op te lossen)
                let FitParserClass = null;
                try {
                    const mod = await import('https://esm.sh/fit-file-parser@2.3.3?bundle');
                    FitParserClass = mod.default || mod.FitParser || mod;
                } catch(e) {
                    console.error("FitParser kon niet worden geladen.", e);
                }

                for (let i = 0; i < currentFiles.length; i++) {
                    let f = { ...currentFiles[i] };
                    if (f.status === 'converted' || f.status === 'renamed' || f.status === 'error') continue;
                    
                    setProgressText(`Converteren van bestand ${i + 1} van ${currentFiles.length}...`);
                    
                    f.status = 'converting';
                    currentFiles[i] = f;
                    setFiles([...currentFiles]);
                    
                    // Korte pauze zodat de React UI tijd heeft om de status 'converting' weer te geven
                    await new Promise(resolve => setTimeout(resolve, 50));
                    
                    try {
                        if (f.ext === 'gpx') {
                            f.gpxContent = await f.fileObj.text();
                            f.status = 'converted';
                        } else if (f.ext === 'tcx') {
                            const text = await f.fileObj.text();
                            f.gpxContent = tcxToGpx(text, f.originalName);
                            f.status = 'converted';
                        } else if (f.ext === 'fit') {
                            if (!FitParserClass) throw new Error("FIT Parser ontbreekt. Controleer internetverbinding.");
                            const arrayBuffer = await f.fileObj.arrayBuffer();
                            f.gpxContent = await fitToGpx(arrayBuffer, f.originalName, FitParserClass);
                            f.status = 'converted';
                        }
                    } catch (err) {
                        console.error("Fout bij " + f.originalName, err);
                        f.status = 'error';
                        f.errorMsg = err.message || "Conversiefout";
                    }
                    
                    currentFiles[i] = f;
                    setFiles([...currentFiles]);
                }
                
                setProgressText("");
                setIsProcessing(false);
            };

            const runPhase2 = async () => {
                setIsProcessing(true);
                setProgressText("Metadata uitlezen en bestanden hernoemen...");
                let currentFiles = [...files];
                
                for (let i = 0; i < currentFiles.length; i++) {
                    let f = { ...currentFiles[i] };
                    if (f.status === 'converted') {
                        f.newName = getNewNameFromGpx(f.gpxContent, f.originalName);
                        f.status = 'renamed';
                        currentFiles[i] = f;
                    }
                }
                
                setFiles(currentFiles);
                setProgressText("");
                setIsProcessing(false);
            };

            const downloadZip = async () => {
                const zip = new JSZip();
                let count = 0;
                const nameMap = {};

                files.forEach(f => {
                    if (f.status === 'renamed' && f.newName && f.gpxContent) {
                        let finalName = f.newName;
                        
                        // Zorg dat elke bestandsnaam uniek is (voorkom overschrijven)
                        if (nameMap[finalName]) {
                            let dupCount = 1;
                            const nameParts = finalName.split('.gpx');
                            let newAttempt = `${nameParts[0]}_${dupCount}.gpx`;
                            while(nameMap[newAttempt]) {
                                dupCount++;
                                newAttempt = `${nameParts[0]}_${dupCount}.gpx`;
                            }
                            finalName = newAttempt;
                        }
                        
                        nameMap[finalName] = true;
                        zip.file(finalName, f.gpxContent);
                        count++;
                    }
                });
                
                if(count > 0) {
                    const content = await zip.generateAsync({type: "blob"});
                    const url = URL.createObjectURL(content);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = "Geconverteerde_Activiteiten.zip";
                    a.click();
                    setTimeout(() => URL.revokeObjectURL(url), 1000);
                }
            };

            const handleReset = () => {
                if (confirm("Zeker dat je alles wilt wissen en opnieuw wilt beginnen?")) {
                    setFiles([]);
                    setProgressText("");
                }
            };

            const allPhase1Done = files.length > 0 && files.every(f => f.status === 'converted' || f.status === 'renamed' || f.status === 'error');
            const allPhase2Done = files.length > 0 && files.every(f => f.status === 'renamed' || f.status === 'error');

            return (
                <div className="max-w-5xl mx-auto space-y-6">
                    <header className="mb-8 flex justify-between items-end border-b border-slate-200 pb-4">
                        <div>
                            <h1 className="text-3xl font-bold text-slate-800">GPX Converter & Renamer</h1>
                            <p className="text-slate-500 mt-2">Converteer FIT/TCX bestanden en formatteer namen naar A_B_C.gpx</p>
                        </div>
                        {files.length > 0 && (
                            <button onClick={handleReset} className="text-sm text-slate-500 hover:text-red-500 transition-colors">
                                Reset Alles
                            </button>
                        )}
                    </header>
                    
                    {/* STATISTIEKEN BALK */}
                    {totalFiles > 0 && (
                        <div className="bg-slate-200/50 rounded-xl p-4 flex flex-wrap gap-4 sm:gap-8 text-sm font-medium border border-slate-200">
                            <div className="flex items-center gap-2">
                                <div className="w-3 h-3 rounded-full bg-slate-400"></div>
                                <span className="text-slate-600">Geüpload: <strong className="text-slate-800">{totalFiles}</strong></span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="w-3 h-3 rounded-full bg-blue-500"></div>
                                <span className="text-slate-600">Wachtend: <strong className="text-slate-800">{pendingCount}</strong></span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="w-3 h-3 rounded-full bg-emerald-500"></div>
                                <span className="text-slate-600">Geconverteerd: <strong className="text-slate-800">{convertedCount}</strong></span>
                            </div>
                            {errorCount > 0 && (
                                <div className="flex items-center gap-2">
                                    <div className="w-3 h-3 rounded-full bg-red-500"></div>
                                    <span className="text-slate-600">Fouten: <strong className="text-red-600">{errorCount}</strong></span>
                                </div>
                            )}
                        </div>
                    )}

                    {/* FASE 1 CARD */}
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <div>
                                <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                    <span className="bg-blue-100 text-blue-700 w-8 h-8 flex items-center justify-center rounded-full text-sm">1</span>
                                    Fase 1: Upload & Converteer
                                </h2>
                                <p className="text-slate-500 mt-1">Selecteer een map met (.gpx, .tcx, .fit) bestanden.</p>
                            </div>
                            
                            <div className="flex flex-col sm:flex-row gap-3 items-center">
                                <label className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-5 py-2.5 rounded-lg cursor-pointer font-medium transition-colors border border-slate-300 w-full sm:w-auto text-center">
                                    Map Selecteren
                                    <input type="file" webkitdirectory="true" directory="true" multiple className="hidden" onChange={handleFileSelect} />
                                </label>
                                
                                {files.length > 0 && !allPhase1Done && (
                                    <button onClick={runPhase1} disabled={isProcessing} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-medium transition-colors flex items-center gap-2 w-full sm:w-auto justify-center disabled:opacity-75 disabled:cursor-not-allowed">
                                        {isProcessing && <div className="spinner"></div>}
                                        {isProcessing ? "Bezig..." : `Converteer ${pendingCount} bestand(en)`}
                                    </button>
                                )}
                            </div>
                        </div>
                        {isProcessing && progressText && (
                            <div className="mt-4 text-sm text-blue-600 font-medium animate-pulse">
                                {progressText}
                            </div>
                        )}
                    </div>

                    {/* FASE 2 CARD */}
                    <div className={`p-6 rounded-2xl shadow-sm border transition-all duration-300 ${allPhase1Done ? 'bg-white border-blue-200' : 'bg-slate-50 border-slate-200 opacity-50 pointer-events-none'}`}>
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <div>
                                <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                    <span className={`w-8 h-8 flex items-center justify-center rounded-full text-sm ${allPhase1Done ? 'bg-blue-100 text-blue-700' : 'bg-slate-200 text-slate-500'}`}>2</span>
                                    Fase 2: Uitlezen & Hernoemen
                                </h2>
                                <p className="text-slate-500 mt-1">Extraheer metadata en hernoem naar YYMMDD_Type_Naam.gpx</p>
                            </div>
                            
                            {allPhase1Done && !allPhase2Done && (
                                <button onClick={runPhase2} disabled={isProcessing} className="bg-purple-600 hover:bg-purple-700 text-white px-5 py-2.5 rounded-lg font-medium transition-colors flex items-center gap-2 w-full sm:w-auto justify-center disabled:opacity-75 disabled:cursor-not-allowed">
                                    {isProcessing && <div className="spinner"></div>}
                                    {isProcessing ? "Bezig..." : "Hernoem Bestanden"}
                                </button>
                            )}
                        </div>
                    </div>

                    {/* RESULTATEN TABEL */}
                    {files.length > 0 && (
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                                <h3 className="font-semibold text-slate-700">Bestanden Overzicht</h3>
                                {allPhase2Done && (
                                    <button onClick={downloadZip} className="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-lg font-medium shadow transition-colors flex items-center gap-2 text-sm">
                                        <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                        Download ZIP
                                    </button>
                                )}
                            </div>
                            <div className="overflow-x-auto max-h-[60vh]">
                                <table className="w-full text-left border-collapse min-w-[600px]">
                                    <thead className="sticky top-0 bg-white shadow-sm z-10">
                                        <tr className="border-b border-slate-200">
                                            <th className="p-4 font-semibold text-slate-500 text-sm">Origineel</th>
                                            <th className="p-4 font-semibold text-slate-500 text-sm">Status</th>
                                            <th className="p-4 font-semibold text-slate-500 text-sm">Nieuwe GPX Naam (A_B_C)</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {files.map(f => (
                                            <tr key={f.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="p-4 text-sm text-slate-700 font-medium">
                                                    <div className="max-w-[250px] truncate" title={f.originalName}>{f.originalName}</div>
                                                </td>
                                                <td className="p-4 text-sm whitespace-nowrap">
                                                    {f.status === 'pending' && <span className="text-slate-400">Wachtend...</span>}
                                                    {f.status === 'converting' && <span className="text-blue-500 animate-pulse font-medium">Conversie bezig...</span>}
                                                    {f.status === 'converted' && <span className="text-blue-600 bg-blue-50 px-2 py-1 rounded">✓ GPX Gereed</span>}
                                                    {f.status === 'renamed' && <span className="text-emerald-600 bg-emerald-50 px-2 py-1 rounded">✓ Hernoemd</span>}
                                                    {f.status === 'error' && <span className="text-red-500 bg-red-50 px-2 py-1 rounded max-w-[200px] truncate block" title={f.errorMsg}>✗ {f.errorMsg}</span>}
                                                </td>
                                                <td className="p-4 text-sm font-mono text-slate-600">
                                                    {f.newName ? <span className="text-purple-700">{f.newName}</span> : <span className="text-slate-300">-</span>}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
