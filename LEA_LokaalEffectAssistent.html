<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokaal Effectassistent - Zeezeilers</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* Custom UI Overlays */
        .ui-panel {
            position: absolute;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }

        #top-bar { top: 20px; left: 20px; right: auto; max-width: 400px; }
        #weather-controls { bottom: 30px; right: 20px; width: 320px; transform: translateY(150%); }
        #weather-controls.active { transform: translateY(0); }
        #legend { bottom: 30px; left: 20px; }

        /* Canvas Overlay */
        .leaflet-overlay-pane canvas {
            pointer-events: none;
        }

        .btn-primary { background-color: #0ea5e9; color: white; transition: background 0.2s; }
        .btn-primary:hover { background-color: #0284c7; }
        
        /* Custom Map Crosshair */
        .leaflet-container.crosshair-cursor-enabled { cursor: crosshair; }
    </style>
</head>
<body>

    <!-- Kaart Container -->
    <div id="map"></div>

    <!-- Top Bar (Zoeken & GPS) -->
    <div id="top-bar" class="ui-panel p-4 flex flex-col gap-3">
        <h1 class="text-xl font-bold text-slate-800 border-b pb-2"><i class="fa-solid fa-sailboat text-sky-500 mr-2"></i>Lokaal Effectassistent</h1>
        
        <div class="flex gap-2">
            <input type="text" id="search-input" placeholder="Zoek locatie (bijv. Split, Kroatië)" class="flex-1 px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-sky-500">
            <button id="btn-search" class="btn-primary px-4 py-2 rounded-md"><i class="fa-solid fa-search"></i></button>
            <button id="btn-gps" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-md transition"><i class="fa-solid fa-location-crosshairs"></i></button>
        </div>
        
        <p class="text-sm text-slate-600 mt-1">
            <i class="fa-solid fa-1 mr-1 text-sky-500"></i> Gebruik de teken-tool (rechtsboven in beeld) om je vaargebied te selecteren.
        </p>
    </div>

    <!-- Legenda -->
    <div id="legend" class="ui-panel p-4 hidden">
        <h3 class="font-bold text-sm mb-2">Gevarenzones</h3>
        <div class="flex items-center gap-2 mb-1">
            <div class="w-4 h-4 bg-orange-400 opacity-60 rounded"></div>
            <span class="text-xs">Valwind (Downdraft / Versnelling)</span>
        </div>
        <div class="flex items-center gap-2 mb-1">
            <div class="w-4 h-4 bg-red-500 opacity-60 rounded"></div>
            <span class="text-xs">Luwte (Windschaduw / Werveling)</span>
        </div>
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-arrow-right text-slate-600"></i>
            <span class="text-xs">Windrichting & Kracht</span>
        </div>
    </div>

    <!-- Weer & Simulatie Controls -->
    <div id="weather-controls" class="ui-panel p-5">
        <div class="flex justify-between items-center border-b pb-3 mb-4">
            <h2 class="text-lg font-bold text-slate-800"><i class="fa-solid fa-wind mr-2"></i>Weer Input</h2>
            <button id="btn-export" class="text-xs bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1 rounded shadow" title="Exporteer voor offline gebruik">
                <i class="fa-solid fa-download mr-1"></i> Offline Exporteren
            </button>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Windrichting (<span id="dir-val">315</span>° / NW)</label>
                <input type="range" id="wind-dir" min="0" max="359" value="315" class="w-full cursor-pointer">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Windsnelheid (<span id="speed-val">15</span> kts)</label>
                <input type="range" id="wind-speed" min="0" max="50" value="15" class="w-full cursor-pointer">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Windvlagen (<span id="gust-val">22</span> kts)</label>
                <input type="range" id="wind-gusts" min="0" max="70" value="22" class="w-full cursor-pointer">
            </div>
        </div>

        <button id="btn-simulate" class="w-full mt-5 btn-primary py-2 rounded-lg font-semibold shadow-md">
            <i class="fa-solid fa-arrows-rotate mr-2"></i> Bereken Lokale Effecten
        </button>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    
    <script>
        // --- 1. INITIALISATIE KAART ---
        const map = L.map('map', { zoomControl: false }).setView([43.5081, 16.4402], 9); // Default: Split, Kroatië
        
        // Verplaats de standaard zoom knoppen naar rechtsboven
        L.control.zoom({ position: 'topright' }).addTo(map);
        
        // Nautisch-achtige rustige basemap
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            maxZoom: 18
        }).addTo(map);

        // --- 2. TEKEN TOOL (Leaflet Draw) ---
        const drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        const drawControl = new L.Control.Draw({
            position: 'topright', // Positioneer de tekenknoppen rechts in beeld
            edit: { featureGroup: drawnItems, remove: true },
            draw: {
                polygon: false, polyline: false, circle: false, circlemarker: false, marker: false,
                rectangle: { shapeOptions: { color: '#0ea5e9', weight: 2, fillOpacity: 0.1 } }
            }
        });
        map.addControl(drawControl);

        // --- 3. UI & EVENT LISTENERS ---
        const uiControls = document.getElementById('weather-controls');
        const legend = document.getElementById('legend');
        let simulationArea = null;
        let gridData = null; // Opslag voor de (gesimuleerde) topografie
        let canvasLayer = null; // L.Layer voor de HTML5 Canvas
        
        // Koppel sliders aan weergave
        ['dir', 'speed', 'gusts'].forEach(id => {
            const input = document.getElementById(`wind-${id === 'dir' ? 'dir' : (id === 'speed' ? 'speed' : 'gusts')}`);
            const display = document.getElementById(`${id}-val`);
            input.addEventListener('input', (e) => {
                display.innerText = e.target.value;
                if(gridData) runSimulation(); // Live update
            });
        });

        // Gebied getekend
        map.on(L.Draw.Event.CREATED, function (e) {
            drawnItems.clearLayers(); // Slechts 1 gebied tegelijk
            const layer = e.layer;
            drawnItems.addLayer(layer);
            simulationArea = layer.getBounds();
            
            // Toon controls
            uiControls.classList.add('active');
            legend.classList.remove('hidden');
            
            // Simuleer het ophalen van hoogtedata (genereer mock eilanden in de box)
            generateTopography(simulationArea);
            runSimulation();
        });

        // Zoekfunctie
        document.getElementById('btn-search').addEventListener('click', async () => {
            const query = document.getElementById('search-input').value;
            if(!query) return;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await res.json();
                if(data.length > 0) {
                    map.setView([data[0].lat, data[0].lon], 10);
                } else {
                    alert('Locatie niet gevonden.');
                }
            } catch (err) { console.error(err); }
        });

        // GPS Functionaliteit
        document.getElementById('btn-gps').addEventListener('click', () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => map.flyTo([pos.coords.latitude, pos.coords.longitude], 12),
                    (err) => alert('Kan locatie niet ophalen. Controleer permissies.')
                );
            } else {
                alert('Geolocatie wordt niet ondersteund door deze browser.');
            }
        });

        document.getElementById('btn-simulate').addEventListener('click', runSimulation);

        // --- 4. TOPOGRAFIE GENERATIE (MOCK DATA) ---
        // Omdat we in een frontend-only omgeving werken, genereren we realistische "eilanden" 
        // binnen de geselecteerde bounding box via math gradients, in plaats van een externe API.
        const GRID_RES = 100; // Verhoogd naar 100 voor fijnmaziger rekenwerk en meer detail
        
        function generateTopography(bounds) {
            gridData = {
                rows: GRID_RES, cols: GRID_RES,
                bounds: bounds,
                cells: [],
                peaks: [] // Voor windschaduw logica
            };

            const latStep = (bounds.getNorth() - bounds.getSouth()) / GRID_RES;
            const lngStep = (bounds.getEast() - bounds.getWest()) / GRID_RES;

            // Genereer 4-7 willekeurige pieken die clusters (archipels) vormen
            const numIslands = Math.floor(Math.random() * 4) + 4;
            for(let i=0; i<numIslands; i++) {
                gridData.peaks.push({
                    row: Math.floor(Math.random() * (GRID_RES-20)) + 10,
                    col: Math.floor(Math.random() * (GRID_RES-20)) + 10,
                    height: Math.random() * 800 + 400, // Hoogte in meters
                    spreadX: Math.random() * 6 + 4,
                    spreadY: Math.random() * 6 + 4
                });
            }

            for (let r = 0; r < GRID_RES; r++) {
                const rowArr = [];
                for (let c = 0; c < GRID_RES; c++) {
                    let height = 0;
                    const lat = bounds.getNorth() - (r * latStep);
                    const lng = bounds.getWest() + (c * lngStep);

                    // Bereken hoogte op basis van afstand tot pieken (Gaussian)
                    gridData.peaks.forEach(peak => {
                        const distSq = Math.pow((r - peak.row) / peak.spreadX, 2) + Math.pow((c - peak.col) / peak.spreadY, 2);
                        height += peak.height * Math.exp(-distSq / 2);
                    });

                    // Ruisonderdrukking (kustlijn scherp maken)
                    if(height < 50) height = 0; 
                    
                    rowArr.push({ lat, lng, height, windU: 0, windV: 0, zone: 'none' });
                }
                gridData.cells.push(rowArr);
            }
        }

        // --- 5. LOKALE EFFECTEN SIMULATIE (HEURISTISCH MODEL) ---
        function runSimulation() {
            if (!gridData) return;

            const dir = parseInt(document.getElementById('wind-dir').value);
            const speed = parseInt(document.getElementById('wind-speed').value);
            const gusts = parseInt(document.getElementById('wind-gusts').value);
            
            // Windrichting wiskundig (van waar het komt naar rad)
            const rad = (dir + 180) * (Math.PI / 180);
            const baseU = Math.sin(rad); // Genormaliseerde basisrichting
            const baseV = Math.cos(rad); // Y is geïnverteerd in Leaflet map coords

            // Array om de windrichting in op te slaan voordat we snelheid toewijzen
            let dirGridU = [];
            let dirGridV = [];

            // Stap 1: Bepaal deflectie (afbuiging) en gevarenzones
            for (let r = 0; r < GRID_RES; r++) {
                dirGridU[r] = []; dirGridV[r] = [];
                for (let c = 0; c < GRID_RES; c++) {
                    let cell = gridData.cells[r][c];
                    cell.zone = 'none';
                    
                    let u = baseU;
                    let v = baseV;

                    if (r > 0 && r < GRID_RES-1 && c > 0 && c < GRID_RES-1) {
                        // Bereken hellingshoek
                        const dx = (gridData.cells[r][c+1].height - gridData.cells[r][c-1].height) / 2;
                        const dy = (gridData.cells[r-1][c].height - gridData.cells[r+1].height) / 2;
                        
                        const gradientMag = Math.sqrt(dx*dx + dy*dy);
                        
                        if (gradientMag > 5 && cell.height > 20) {
                            const nx = dx / gradientMag;
                            const ny = dy / gradientMag;
                            
                            const dot = (u * nx) + (v * ny);

                            // Windward (Wind botst op de berg -> Valwind / Opstuwing)
                            if (dot > 0.1) {
                                cell.zone = 'valwind';
                                // Buig de vector af, weg van de helling
                                u = u - nx * dot * 1.5;
                                v = v - ny * dot * 1.5;
                            }
                            // Leeward (Achter de berg -> Luwte en Werveling)
                            else if (dot < -0.2) {
                                cell.zone = 'luwte';
                                // Werveling: voeg dwarse 'curl' toe aan de wind
                                const crossX = -ny; const crossY = nx;
                                const side = ((u * crossX) + (v * crossY) > 0) ? 1 : -1;
                                u = u * 0.4 + crossX * side * 0.6; // Krult naar binnen
                                v = v * 0.4 + crossY * side * 0.6;
                            }
                        }
                    }
                    dirGridU[r][c] = u;
                    dirGridV[r][c] = v;
                }
            }

            // Stap 2: Fluid-like Smoothing (Zorgt voor vloeiend meedraaiende pijltjes om eilanden)
            const iteraties = 8;
            for (let i = 0; i < iteraties; i++) {
                let nextU = []; let nextV = [];
                for (let r = 0; r < GRID_RES; r++) {
                    nextU[r] = []; nextV[r] = [];
                    for (let c = 0; c < GRID_RES; c++) {
                        if (r === 0 || r === GRID_RES-1 || c === 0 || c === GRID_RES-1) {
                            nextU[r][c] = baseU; nextV[r][c] = baseV; continue;
                        }
                        
                        let sumU = dirGridU[r][c] * 2; // Behoud eigen karakter
                        let sumV = dirGridV[r][c] * 2;
                        let gewicht = 2;
                        
                        // Blur met directe buren voor fluïdum-effect
                        const buren = [[-1,0],[1,0],[0,-1],[0,1]];
                        buren.forEach(([dr, dc]) => {
                            sumU += dirGridU[r+dr][c+dc];
                            sumV += dirGridV[r+dr][c+dc];
                            gewicht++;
                        });
                        
                        nextU[r][c] = sumU / gewicht;
                        nextV[r][c] = sumV / gewicht;
                    }
                }
                dirGridU = nextU; dirGridV = nextV;
            }

            // Stap 3: Bereken uiteindelijke zichtbare snelheid (Pijllengte)
            for (let r = 0; r < GRID_RES; r++) {
                for (let c = 0; c < GRID_RES; c++) {
                    let cell = gridData.cells[r][c];
                    
                    const mag = Math.sqrt(dirGridU[r][c]**2 + dirGridV[r][c]**2) || 1;
                    const normU = dirGridU[r][c] / mag;
                    const normV = dirGridV[r][c] / mag;

                    let localeSnelheid = speed;
                    if (cell.zone === 'valwind') localeSnelheid = gusts * 0.9;
                    if (cell.zone === 'luwte') localeSnelheid = speed * 0.3; // Luwte vertraagt de wind zwaar

                    cell.windU = normU * localeSnelheid;
                    cell.windV = normV * localeSnelheid;
                }
            }

            renderCanvas();
        }

        // --- 6. CANVAS RENDERING (Visualisatie) ---
        // We maken een custom Canvas layer die over de kaart ligt
        L.CanvasOverlay = L.Layer.extend({
            onAdd: function(map) {
                this._map = map;
                if (!this._canvas) {
                    this._canvas = L.DomUtil.create('canvas', 'leaflet-zoom-animated');
                    this._canvas.style.position = 'absolute';
                    this._canvas.style.zIndex = 400; // Bovenop map, onder UI
                }
                map.getPanes().overlayPane.appendChild(this._canvas);
                map.on('moveend', this._reset, this);
                map.on('resize', this._reset, this);
                this._reset();
            },
            onRemove: function(map) {
                L.DomUtil.remove(this._canvas);
                map.off('moveend', this._reset, this);
                map.off('resize', this._reset, this);
            },
            _reset: function() {
                const size = this._map.getSize();
                const topLeft = this._map.containerPointToLayerPoint([0, 0]);
                L.DomUtil.setPosition(this._canvas, topLeft);
                this._canvas.width = size.x;
                this._canvas.height = size.y;
                if(gridData) drawSimulation(this._canvas, this._map, topLeft);
            },
            redraw: function() { this._reset(); }
        });

        if (!canvasLayer) {
            canvasLayer = new L.CanvasOverlay();
            map.addLayer(canvasLayer);
        }

        function renderCanvas() {
            if(canvasLayer) canvasLayer.redraw();
        }

        function drawSimulation(canvas, mapObj, offset) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!gridData) return;

            const gridStap = canvas.width / GRID_RES; // Bereken celgrootte in pixels

            // 1. Teken Gevarenzones en Eiland (Semi-transparant voor kaart-zichtbaarheid)
            for (let r = 0; r < GRID_RES; r++) {
                for (let c = 0; c < GRID_RES; c++) {
                    const cell = gridData.cells[r][c];
                    const p = mapObj.latLngToContainerPoint([cell.lat, cell.lng]);
                    
                    // We tekenen topografie zeer transparant (opacity 0.2)
                    if (cell.height > 50) {
                        ctx.fillStyle = `rgba(34, 139, 34, ${Math.min(0.2, cell.height/3500)})`; 
                        ctx.fillRect(p.x - gridStap, p.y - gridStap, gridStap*2, gridStap*2);
                    }

                    // Valwind en Luwte zones (Zachte, doorzichtige ronde overlays)
                    if (cell.zone === 'valwind') {
                        ctx.fillStyle = 'rgba(255, 165, 0, 0.2)'; // Zacht oranje/geel
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, gridStap * 1.5, 0, Math.PI*2);
                        ctx.fill();
                    } else if (cell.zone === 'luwte') {
                        ctx.fillStyle = 'rgba(255, 0, 0, 0.15)'; // Zacht rood
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, gridStap * 1.5, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
            }

            // 2. Teken Wind Vector Pijltjes
            ctx.lineWidth = 1.5;
            const arrowSpacing = 4; // Meer tussenruimte omdat het grid nu véél fijner is

            for (let r = 0; r < GRID_RES; r += arrowSpacing) {
                for (let c = 0; c < GRID_RES; c += arrowSpacing) {
                    const cell = gridData.cells[r][c];
                    if (!cell) continue;
                    
                    const p = mapObj.latLngToContainerPoint([cell.lat, cell.lng]);
                    
                    // Alleen tekenen als het in beeld is
                    if(p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) continue;

                    const speedMag = Math.sqrt(cell.windU*cell.windU + cell.windV*cell.windV);
                    const angle = Math.atan2(-cell.windV, cell.windU); // Pijl draait netjes mee met de vloeiende deflectie
                    
                    // Pijllengte schaalt met windsnelheid
                    const len = Math.max(8, Math.min(25, speedMag * 0.8));

                    ctx.beginPath();
                    // Lijn
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x + Math.cos(angle)*len, p.y + Math.sin(angle)*len);
                    // Pijlpunt
                    ctx.lineTo(p.x + Math.cos(angle)*len - Math.cos(angle - Math.PI/6)*5, p.y + Math.sin(angle)*len - Math.sin(angle - Math.PI/6)*5);
                    ctx.moveTo(p.x + Math.cos(angle)*len, p.y + Math.sin(angle)*len);
                    ctx.lineTo(p.x + Math.cos(angle)*len - Math.cos(angle + Math.PI/6)*5, p.y + Math.sin(angle)*len - Math.sin(angle + Math.PI/6)*5);
                    
                    // Kleur pijl subtiel mee met de gevarenzone (iets fellere stroke kleur)
                    ctx.strokeStyle = cell.zone === 'valwind' ? 'rgba(211, 84, 0, 0.9)' : (cell.zone === 'luwte' ? 'rgba(127, 140, 141, 0.9)' : 'rgba(41, 128, 185, 0.8)');
                    ctx.stroke();
                }
            }
        }

        // --- 7. EXPORT FUNCTIONALITEIT ---
        document.getElementById('btn-export').addEventListener('click', () => {
            if(!gridData) {
                alert("Teken eerst een vaargebied en genereer data voordat je exporteert!");
                return;
            }
            
            // Creëer een exacte kopie van de huidige HTML
            const htmlContent = document.documentElement.outerHTML;
            
            // Injecteer de huidige state als een JSON string in de geëxporteerde file
            // Zodat de file direct de huidige situatie kan inladen
            const stateScript = `
                <script>
                    window.INITIAL_OFFLINE_STATE = ${JSON.stringify(gridData)};
                    window.INITIAL_BOUNDS = {
                        n: ${gridData.bounds.getNorth()},
                        s: ${gridData.bounds.getSouth()},
                        e: ${gridData.bounds.getEast()},
                        w: ${gridData.bounds.getWest()}
                    };
                <\/script>
            `;
            
            // Plak de state vlak voor de sluitende head tag
            const finalHtml = htmlContent.replace('</head>', stateScript + '</head>');

            const blob = new Blob([finalHtml], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `Lokale_Windeffecten_${new Date().toISOString().slice(0,10)}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // Offline state handler (Checkt of het document is geëxporteerd)
        window.onload = () => {
            if (window.INITIAL_OFFLINE_STATE) {
                gridData = window.INITIAL_OFFLINE_STATE;
                
                // Reconstrueer Leaflet bounds object
                const b = window.INITIAL_BOUNDS;
                const bounds = L.latLngBounds([b.s, b.w], [b.n, b.e]);
                
                // Teken rechthoek op de kaart terug
                L.rectangle(bounds, {color: '#0ea5e9', weight: 2, fillOpacity: 0.1}).addTo(drawnItems);
                map.fitBounds(bounds);
                
                uiControls.classList.add('active');
                legend.classList.remove('hidden');
                runSimulation();
                
                alert("Offline Modus: Vorige berekening succesvol geladen.");
            }
        };

    </script>
</body>
</html>
